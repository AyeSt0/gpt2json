name: Bug report
description: Report a reproducible problem
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Use synthetic sample data only. Do not paste secrets.
      placeholder: |
        1. Run ...
        2. Observe ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: 0.1.0
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Redact credentials, tokens, cookies, local usernames, and account data.
      render: text
