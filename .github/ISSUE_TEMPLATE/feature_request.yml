    id: problem
    attributes:
      label: 需求背景
      description: 希望 GPT2JSON 支持什么？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 方案建议
      description: 描述格式、backend 或 UI 改动。请只使用合成示例。
    validations:
      required: true
